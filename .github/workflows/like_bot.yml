name: X いいね巡回Bot

on:
  workflow_dispatch:  # cron-job.org から GitHub API 経由でトリガー

jobs:
  like:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ライブラリのインストール
        run: pip install -r requirements.txt

      - name: Playwright Chromium のインストール
        run: python -m playwright install chromium --with-deps

      - name: Cookie 更新（自動ログイン）
        env:
          X_USERNAME_KNZW: ${{ secrets.X_USERNAME_KNZW }}
          X_PASSWORD_KNZW: ${{ secrets.X_PASSWORD_KNZW }}
          X_TOTP_KNZW:     ${{ secrets.X_TOTP_KNZW }}
        run: python refresh_cookies.py

      - name: デバッグ画像をアップロード
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png

      - name: 実行 (knzw)
        env:
          CONFIG_PATH: config/knzw.yml
        run: python like_bot.py
