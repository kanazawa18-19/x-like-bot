name: X いいね巡回Bot

on:
  workflow_dispatch:  # cron-job.org から GitHub API 経由でトリガー

jobs:
  like:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: ライブラリのインストール
        run: pip install -r requirements.txt

      - name: Playwright Chromium のインストール
        run: python -m playwright install chromium --with-deps

      - name: cookies ファイルを作成
        env:
          X_COOKIES_KNZW: ${{ secrets.X_COOKIES_KNZW }}
        run: |
          python3 -c "
          import os
          with open('cookies_knzw.json', 'w', encoding='utf-8') as f:
              f.write(os.environ['X_COOKIES_KNZW'])
          print('cookies ファイル作成完了')
          "

      - name: liked_ids ファイルを作成
        env:
          X_LIKED_IDS_KNZW: ${{ secrets.X_LIKED_IDS_KNZW }}
        run: |
          python3 -c "
          import os, json
          raw = os.environ.get('X_LIKED_IDS_KNZW', '').strip()
          with open('liked_ids_knzw.json', 'w', encoding='utf-8') as f:
              f.write(raw if raw else '[]')
          print('liked_ids ファイル作成完了')
          "

      - name: 実行 (knzw)
        env:
          CONFIG_PATH: config/knzw.yml
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python like_bot.py
